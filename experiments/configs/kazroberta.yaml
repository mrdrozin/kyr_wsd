# Kaz-RoBERTa — монолингвальная казахская модель.
# Тюркский бейзлайн вместо BERTurk: турецкая модель латинская, на киргизской
# кириллице давала бы сплошные [UNK]. Казахский — кипчакская ветвь (близок
# киргизскому) и использует кириллицу; byte-level BPE исключает UNK.
model_name: kz-transformers/kaz-roberta-conversational

# Текущие результаты получены на дефолтном lr=2e-5 (base full FT дал аномально
# низкие 0.49 при dev 0.65 — переобучение/доменный сдвиг; в тексте обсуждается
# как находка). При желании переобучить — RoBERTa-семейство чувствительно к lr,
# рекомендуется lr=1e-5 (как у XLM-R).
